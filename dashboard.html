<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotasApp</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>

<body>

  <aside class="sidebar" id="sidebar">

    <div class="sb-top">
      <button class="ws-btn" onclick="toggleDD('ws-dd')">
        <div class="ws-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            <line x1="8" y1="7" x2="15" y2="7" />
            <line x1="8" y1="11" x2="15" y2="11" />
          </svg>
        </div>
        <span class="ws-name">Notas<span>App</span></span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" style="color:var(--t4)">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>
      <div class="dropdown" id="ws-dd" style="display:none;top:54px;left:8px;right:8px"
        onclick="event.stopPropagation()">
        <div class="dropdown-item" onclick="nav('updates')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Actualizaciones
        </div>
      </div>
    </div>

    <div class="nav-sec">
      <div class="nav-item active" data-view="home" onclick="nav('home')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Inicio
      </div>
      <div class="nav-item" data-view="search" onclick="nav('search')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        Buscar
      </div>
      <div class="nav-item" data-view="templates" onclick="nav('templates')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        Plantillas
      </div>
      <div class="nav-item" data-view="calendar" onclick="nav('calendar')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        Calendario
      </div>
      <div class="nav-item" data-view="trash" onclick="nav('trash')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
        Papelera
      </div>
    </div>

    <div class="nav-sec" style="padding-bottom:2px">
      <div class="nav-lbl">Mis páginas</div>
    </div>

    <div class="pages-sec" id="sidebar-pages"></div>

    <div class="sb-bot">
      <button class="new-pg-btn" onclick="newNote()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Nueva página
      </button>
    </div>

  </aside>

  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="view-root"></div>
  </div>

  <div id="modal-root"></div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <script src="dashboard.js"></script>
</body>

</html>
